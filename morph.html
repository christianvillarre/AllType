<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simple SVG Swap</title>
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .stage{
      position:relative;
      width:min(70vmin, 540px);
      aspect-ratio: 510 / 507;
    }

    .stage svg{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;

      /* rotate around center */
      transform-origin: 50% 50%;
      transform-box: fill-box;
    }

    /* svg1: hold -> rotate to 45deg -> fade out */
    .svg1 { animation: svg1Anim 2.2s ease-in-out infinite; }

    /* svg2: stay hidden until svg1 is done rotating, then fade in */
    .svg2 { animation: svg2Anim 2.2s ease-in-out infinite; }

@keyframes svg1Anim {
  0%   { opacity: 1; transform: rotate(0deg); }
  40%  { opacity: 1; transform: rotate(0deg); }

  /* rotate before svg2 fades in */
  55%  { opacity: 1; transform: rotate(-45deg); }

  /* then fade out */
  62%  { opacity: 0; transform: rotate(-45deg); }

  /* stay hidden while svg2 is up */
  95%  { opacity: 0; transform: rotate(-45deg); }

  /* snap back for next loop while still hidden */
  100% { opacity: 1; transform: rotate(0deg); }
}

@keyframes svg2Anim {
  0%   { opacity: 0; transform: scale(4.5) rotate(12deg); }
  45%  { opacity: 0; transform: scale(4.5) rotate(12deg); }

  /* start appearing sooner */
  50%  { opacity: 0; transform: scale(4.5) rotate(12deg); }

  /* rotate + scale into place */
  55%  { opacity: 1; transform: scale(6) rotate(0deg); }

  85%  { opacity: 1; transform: scale(6) rotate(0deg); }

  100% { opacity: 0; transform: scale(6) rotate(0deg); }
}
    /* NOTE: leaving your svg2 sizing exactly as you had it */
    .svg2 { transform: scale(6); transform-origin: 50% 50%; }
  </style>
</head>
