<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>All-Type Roofing and Construction | Coming Soon</title>

  <style>
    :root{
      --ink: #ffffff;
      --muted: rgba(255,255,255,.82);
      --card: rgba(0,0,0,.32);
      --cardBorder: rgba(255,255,255,.16);
    }

    *{ box-sizing:border-box; }
    html, body { height:100%; margin:0; }
    body{
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--ink);
      overflow: hidden;
    }

    /* Fullscreen background image */
    .bg{
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(0,0,0,.45), rgba(0,0,0,.55)),
        url("images/Alltype\ Web\ BG.jpg") center/cover no-repeat;
      transform: scale(1.02);
    }

    /* Center content */
    .wrap{
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: clamp(18px, 3vw, 42px);
    }

    .card{
      width: min(680px, 92vw);
      text-align: center;
      padding: clamp(22px, 4vw, 44px);
      background: var(--card);
      border: 1px solid var(--cardBorder);
      border-radius: 24px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
    }

    .logo{
      width: clamp(120px, 18vw, 200px);
      height: auto;
      display: block;
      margin: 0 auto 14px;
      filter: drop-shadow(0 10px 22px rgba(0,0,0,.35));
      user-select: none;
      -webkit-user-drag: none;
    }

    h1{
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      letter-spacing: -0.02em;
      line-height: 1.05;
    }

    p.sub{
      margin: 12px auto 0;
      max-width: 52ch;
      color: var(--muted);
      font-size: clamp(14px, 1.4vw, 18px);
      line-height: 1.55;
    }

    .contact{
      margin-top: clamp(18px, 2.4vw, 28px);
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    .phone{
      font-size: clamp(16px, 1.6vw, 18px);
      color: var(--ink);
      opacity: .95;
      text-decoration: none;
      display: inline-flex;
      gap: 10px;
      align-items: center;
    }
    .phone:hover{ text-decoration: underline; }

    .btn{
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 18px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(255,255,255,.12);
      color: var(--ink);
      text-decoration: none;
      font-weight: 600;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
      min-width: 220px;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.18);
      border-color: rgba(255,255,255,.32);
    }

    .fine{
      margin-top: 16px;
      font-size: 12px;
      color: rgba(255,255,255,.7);
    }

    /* small icon svg */
    .ico{ width: 18px; height: 18px; display:inline-block; }

    /* Mobile spacing */
    @media (max-width: 480px){
      .btn{ width: 100%; min-width: 0; }
    }
  </style>

</head>

<body>
  <div class="bg" aria-hidden="true"></div>

  <main class="wrap">
    <section class="card" role="region" aria-label="Coming soon">
      <!-- Replace with your logo file -->
      <img class="logo" src="images/Alltype Logo.png" alt="Your Company Logo" />

      <h1>Coming Soon</h1>
      <p class="sub">
        We’re building something new. In the meantime, reach out and we’ll get back to you quickly.
      </p>

      <div class="contact">
        <!-- Replace phone number -->
        <a class="phone" href="tel:+17135551234" aria-label="Call us">
          <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6.6 10.8c1.6 3.1 3.5 5 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.3 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C11.3 21 3 12.7 3 2c0-.6.4-1 1-1h3.3c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.3 1.1L6.6 10.8z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
          (281) 397-6614
        </a>

        <!-- Replace email -->
        <a class="btn" href="mailto:frontdesk@alltype-construction.com?subject=Inquiry%20from%20Coming%20Soon%20Page">
          <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M4 6.5h16v11H4v-11z" stroke="currentColor" stroke-width="1.8" />
            <path d="M4.5 7l7.5 6 7.5-6" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" />
          </svg>
          Email Us
        </a>

        <div class="fine">© <span id="year"></span> All-Type Roofing and Construction Inc. All Rights Reserved</div>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</html>
